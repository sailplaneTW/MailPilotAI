<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MailRefine Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; background: #0b57d0; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0842a0; }
  </style>
</head>
<body>
  <h1>MailRefine Settings</h1>
  
  <div class="form-group">
    <label for="apiKey">Gemini API Key</label>
    <input type="text" id="apiKey" placeholder="AIzaSy...">
  </div>

  <div class="form-group">
    <label for="model">Model</label>
    <div style="display: flex; gap: 10px;">
      <select id="model" style="flex-grow: 1;">
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
      </select>
      <button id="fetchModelsBtn" type="button" style="white-space: nowrap;">Fetch Models</button>
    </div>
  </div>

  <div class="form-group">
    <label for="systemPrompt">System Prompt (Rewrite Rules)</label>
    <textarea id="systemPrompt" rows="4">You are a professional email assistant. Please rewrite the following email to be clear, polite, and professional.</textarea>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="enableDoubleConfirm" checked>
      Enable Double-Click Send Confirmation
    </label>
  </div>

  <button id="saveBtn">Save Settings</button>
  <span id="status" style="margin-left: 10px; color: green;"></span>

  <script src="options.js"></script>
</body>
</html>
