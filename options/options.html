<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>MailRefine Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 15px;
      background: #0b57d0;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0842a0;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>MailRefine Settings</h1>

  <div class="form-group">
    <label for="apiKey">Gemini API Key</label>
    <input type="text" id="apiKey" placeholder="AIzaSy...">
  </div>

  <div class="form-group">
    <label for="model">Model</label>
    <div style="display: flex; gap: 10px;">
      <select id="model" style="flex-grow: 1;" disabled>
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
      </select>
      <button id="fetchModelsBtn" type="button" style="white-space: nowrap;" disabled>Update Models</button>
    </div>
  </div>

  <div class="form-group">
    <label for="optimizePrompt">優化內文 Prompt</label>
    <textarea id="optimizePrompt" rows="3">請以商業 email 的慣例邏輯，替我改寫內文。不用過度客氣但請要有禮貌，也刪除不必要的冗字</textarea>
  </div>

  <div class="form-group">
    <label for="translateLang">翻譯目標語言</label>
    <input type="text" id="translateLang" placeholder="例如：英文、日文">
  </div>

  <div class="form-group">
    <label for="titlePrompt">優化標題 Prompt</label>
    <textarea id="titlePrompt" rows="2">請根據內文的內容及語系替我產生信件標題</textarea>
  </div>

  <div class="form-group">
    <label for="checkPrompt">信件檢查 Prompt (選填)</label>
    <textarea id="checkPrompt" rows="2" placeholder="請檢查有沒有錯字或是語氣不順的地方"></textarea>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="enableDoubleConfirm" checked>
      Enable Double-Click Send Confirmation (寄信防呆)
    </label>
  </div>

  <button id="saveBtn">Save Settings</button>
  <span id="status" style="margin-left: 10px; color: green;"></span>

  <script src="options.js"></script>
</body>

</html>
