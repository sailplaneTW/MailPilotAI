<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>MailPilot Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 15px;
      background: #0b57d0;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0842a0;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    small {
      font-weight: normal;
      color: #555;
    }
  </style>
</head>

<body>
  <h1 data-i18n="opt_title">MailPilot Settings</h1>

  <div class="form-group">
    <label for="uiLang" data-i18n="opt_ui_lang">UI Language</label>
    <select id="uiLang">
      <option value="en">English</option>
      <option value="zh_TW">正體中文 (Traditional Chinese)</option>
      <option value="zh_CN">简体中文 (Simplified Chinese)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="apiKey" data-i18n="opt_api_key">Gemini API Key</label>
    <input type="text" id="apiKey" placeholder="AIzaSy...">
  </div>

  <div class="form-group">
    <label for="model" data-i18n="opt_model">Model</label>
    <div style="display: flex; gap: 10px;">
      <select id="model" style="flex-grow: 1;" disabled>
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
      </select>
      <button id="fetchModelsBtn" type="button" style="white-space: nowrap;" disabled data-i18n="opt_update_models">Update Models</button>
    </div>
  </div>

  <div class="form-group">
    <label for="optimizePrompt" data-i18n="opt_prompt_optimize">Optimize Body Prompt</label>
    <textarea id="optimizePrompt" rows="3"></textarea>
  </div>

  <div class="form-group">
    <label for="translateLang" data-i18n="opt_translate_lang">Target Translation Language</label>
    <select id="translateLang">
      <option value="English">English</option>
      <option value="Traditional Chinese">Traditional Chinese</option>
      <option value="Simplified Chinese">Simplified Chinese</option>
      <option value="Japanese">Japanese</option>
    </select>
  </div>

  <div class="form-group">
    <label for="titlePrompt" data-i18n="opt_prompt_title">Optimize Subject Prompt</label>
    <textarea id="titlePrompt" rows="3"></textarea>
  </div>

  <div class="form-group">
    <label for="checkPrompt">
      <span data-i18n="opt_prompt_check">Check Email Prompt (Disabled when empty)</span>
    </label>
    <textarea id="checkPrompt" rows="3"></textarea>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="enableDoubleConfirm" checked>
      <span data-i18n="opt_double_confirm">Enable Double-Click Send Confirmation</span>
    </label>
  </div>

  <button id="saveBtn" data-i18n="opt_save">Save Settings</button>
  <span id="status" style="margin-left: 10px; color: green;"></span>

  <script src="../utils/i18n.js"></script>
  <script src="options.js"></script>
</body>

</html>
