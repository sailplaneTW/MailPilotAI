<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      width: 280px;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f8fc;
      color: #202124;
    }

    .shell {
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 4px;
      color: #5f6368;
      font-size: 12px;
      line-height: 1.4;
    }

    .status-area {
      padding: 12px;
      font-size: 12px;
      border: 1px solid #e0e3e7;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 4px 14px rgba(60, 64, 67, 0.08);
    }

    .status-row {
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-val {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 700;
      color: #1a73e8;
      background: #e8f0fe;
      text-align: center;
      word-break: break-word;
    }

    .status-missing {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 700;
      color: #d93025;
      background: #fce8e6;
      text-align: center;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #dadce0;
      border-radius: 14px;
      background: white;
      color: #202124;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(60, 64, 67, 0.08);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .menu-item:hover {
      background: #f8f9fa;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(60, 64, 67, 0.12);
    }

    .menu-icon {
      font-size: 15px;
      line-height: 1;
    }

    .tip {
      margin-top: 10px;
      font-size: 11px;
      color: #5f6368;
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="header">
      <div>
        <div class="title" data-i18n="popup_title">MailPilot AI</div>
        <div class="subtitle" data-i18n="popup_subtitle">Gmail compose helper</div>
      </div>
    </div>

    <div class="status-area">
      <div class="status-row">
        <span data-i18n="popup_status_key">API Key:</span>
        <span id="keyStatus" class="status-val">...</span>
      </div>
      <div class="status-row">
        <span data-i18n="popup_status_model">Model:</span>
        <span id="modelStatus" class="status-val">...</span>
      </div>
    </div>

    <button id="settingsBtn" class="menu-item" type="button">
      <span class="menu-icon">⚙️</span>
      <span data-i18n="popup_open_settings">Open Settings</span>
    </button>

    <div class="tip" data-i18n="popup_tip">Open settings to configure the API key and model.</div>
  </div>

  <script src="../utils/i18n.js"></script>
  <script src="popup.js"></script>
</body>

</html>
